<!DOCTYPE html>
<html lang="en">

<head>
    <title>Internship Confirmation Form</title>
</head>

<body>

    <h2>Internship Confirmation Form</h2>

    <div>
        <label for="studentName">Student Name:</label><br>
        <input type="text" id="studentName" name="studentName" required>
    </div>
    <br>

    <div>
        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" required>
    </div>
    <br>

    <div>
        <label>Preferred Internship Type:</label><br>
        <input type="radio" id="onSite" name="internshipType" value="On-Site" required>
        <label for="onSite">On-Site</label><br>

        <input type="radio" id="remote" name="internshipType" value="Remote">
        <label for="remote">Remote</label>
    </div>
    <br>

    <div>
        <label for="duration">Internship Duration:</label><br>
        <select id="duration" name="duration" required>
            <option value="" disabled selected>Select duration</option>
            <option value="6 Weeks">6 Weeks</option>
            <option value="3 Months">3 Months</option>
        </select>
    </div>
    <br>

    <div>
        <label>Skills of Interest:</label><br>
        <input type="checkbox" id="webDev" name="skills" value="Web Development">
        <label for="webDev">Web Development</label><br>

        <input type="checkbox" id="dataAnalysis" name="skills" value="Data Analysis">
        <label for="dataAnalysis">Data Analysis</label><br>

        <input type="checkbox" id="mobileApps" name="skills" value="Mobile Apps">
        <label for="mobileApps">Mobile Apps</label>
    </div>
    <br>

    <div>
        <input type="submit" value="Submit">
    </div>

</body>

</html>
