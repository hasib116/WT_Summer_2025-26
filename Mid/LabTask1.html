<!DOCTYPE html>
<html>

<head>
    <title>Internship Confirmation Form</title>
</head>

<body>

    <h2>Internship Confirmation Form</h2>

    <label>Student Name:</label><br>
    <input type="text" required><br><br>

    <label>Email Address:</label><br>
    <input type="email" required><br><br>

    <label>Preferred Internship Type:</label><br>
    <input type="radio" name="type" value="On-Site"> On-Site<br>
    <input type="radio" name="type" value="Remote"> Remote<br><br>

    <label>Internship Duration:</label><br>
    <select required>
        <option>Select Duration</option>
        <option>6 Weeks</option>
        <option>3 Months</option>
    </select><br><br>

    <label>Skills of Interest:</label><br>
    <input type="checkbox"> Web Development<br>
    <input type="checkbox"> Data Analysis<br>
    <input type="checkbox"> Mobile Apps<br><br>

    <input type="submit" value="Submit">

</body>

</html>
